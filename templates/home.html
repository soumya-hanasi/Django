{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            display: flex;
            text-align: center;
            justify-content: center; /* Center horizontally */
            /*align-items: center; /* Center vertically */
            height: 100vh; /* Full viewport height */
            margin: 0; /* Remove default margin */
            font-family: Arial, sans-serif;
            background-color: rgb(151, 166, 233); /* Light background */
        }
        h1, h2, h3 {
            color: black; 
        }
        .image-container {
            text-align: center; /* Center images horizontally */
        }
        .image-container img {
            display: inline-block;
            margin: 5px; /* Space between images */
            width: 200px; /* Adjust as needed */
            height: auto;
        }
        /* Table Styling */
        .table {
            background-color: rgb(226, 224, 224) !important; /* Make background transparent */
            border: 2px solid black; /* Black border */
        }
        .table th, .table td {
            border: 1px solid black !important; /* Black border for table cells */
            color: black; /* Keep text color black */
        }
    </style>
</head>
<body>
    
    <div class="container pt-5">
        <h1> Employee List</h1>
        <table class="table">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Name</th>
                <th scope="col">Designation</th>
                <th scope="col">Phone Number</th>
              </tr>
            </thead>
            <tbody>
              {% for i in employees %}  
              <tr>
                <th>{{forloop.counter}}</th>
                <td><a href= "{% url 'employee_detail' i.id%}"> {{i.first_name}} {{i.last_name}}</a></td>
                <td>{{i.designation}}</td>
                <td>{{i.phone_number}}</td>
              </tr>
              {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
