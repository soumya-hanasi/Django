{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            display: flex;
            text-align: center;
            justify-content: center; /* Center horizontally */
            /*align-items: center; /* Center vertically */
            height: 100vh; /* Full viewport height */
            margin: 0; /* Remove default margin */
            font-family: Arial, sans-serif;
            background-color: rgb(151, 166, 233); /* Light background */
        }
        h1, h2, h3 {
            color: black; 
        }
        .image-container {
            text-align: center; /* Center images horizontally */
        }
        .image-container img {
            display: inline-block;
            margin: 5px; /* Space between images */
            width: 200px; /* Adjust as needed */
            height: auto;
        }
    </style>
</head>
<body>
    
    <div class="container pt-5">
        <div class="card mx-auto" style="width: 18rem;">
            <img class="card-img-top" src="{{employee.photo.url}}" alt="Employee Photo">
            <div class="card-body">
              <p class="card-text">{{employee.first_name}} {{employee.last_name}}</p>
              <p class="card-text">{{employee.designation}}</p>
              <p class="card-text">{{employee.email_address}}</p>
              <p class="card-text">{{employee.phone_number}}</p>
            </div>
        </div>  
        <br>
        <a href="{% url 'home' %}" class="btn btn-primary"> Back to Home</a>   
    </div>

</body>
</html>
